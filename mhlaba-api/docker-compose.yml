version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: mhlaba-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped
    # For GPU support (optional):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  api:
    build: .
    container_name: mhlaba-api
    ports:
      - "3001:3001"
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - DEFAULT_MODEL=llama3.2
      - PORT=3001
    depends_on:
      - ollama
    restart: unless-stopped

volumes:
  ollama-data:
