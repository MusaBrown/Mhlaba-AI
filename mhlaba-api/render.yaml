services:
  - type: web
    name: mhlaba-api
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: OLLAMA_HOST
        value: http://localhost:11434  # Update with your Ollama URL
      - key: DEFAULT_MODEL
        value: llama3.2
      - key: PORT
        value: 10000  # Render uses port 10000 by default
    # If deploying Ollama on Render too:
    # - key: OLLAMA_HOST
    #   fromService:
    #     name: mhlaba-ollama
    #     type: pserv
    #     property: hostport
